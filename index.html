<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>💰 Expense Tracker</h1>

    <!-- Summary Section -->
    <div class="summary">

        <div class="card">
            <h3>Balance</h3>
            <p>₹0.00</p>
        </div>

        <div class="card">
            <h3>Income</h3>
            <p>₹0.00</p>
        </div>

        <div class="card">
            <h3>Expense</h3>
            <p>₹0.00</p>
        </div>

    </div>

    <!-- Transaction Form -->

    <form>

        <input
            type="text"
            placeholder="Enter Description"
        >

        <button type="submit">
            Add Transaction
        </button>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
